stages:
  training:
    cmd: python src/training.py --config=params.yaml
    deps:
      - data/raw
      - src/training.py
    params:
      - loader.resize
      - loader.batch_size
      - loader.num_workers
      - training.epoches
      - training.start_channel
      - training.num_layers
      - training.lr
      - mlflow_config.remote_server_uri
      - mlflow_config.experiment_name
      - mlflow_config.run_name
      - mlflow_config.registered_model_name

